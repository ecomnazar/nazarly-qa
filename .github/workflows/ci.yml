name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck lib/detect-stack.sh tests/run.sh
      - name: Bash syntax
        run: bash -n lib/detect-stack.sh && bash -n tests/run.sh
      - name: Smoke tests
        run: bash tests/run.sh
